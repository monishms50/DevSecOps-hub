name: Semgrep — SAST

on:
  workflow_call:
    inputs:
      config:
        description: "Semgrep ruleset. Use p/<name> for public packs or a local path."
        type: string
        default: "p/python p/owasp-top-ten"
      scan_path:
        description: "Directory to scan."
        type: string
        default: "."

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep \
            --config ${{ inputs.config }} \
            --sarif \
            --output semgrep.sarif \
            ${{ inputs.scan_path }} \
            --exit-zero || true

          test -f semgrep.sarif || echo '{"version":"2.1.0","runs":[]}' > semgrep.sarif

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif
